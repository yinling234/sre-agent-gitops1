# --- MCP Server Service ---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server-service
  namespace: ai-services
spec:
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: mcp-hr-server

---
# --- MCP Server Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-hr-server
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-hr-server
  template:
    metadata:
      labels:
        app: mcp-hr-server
    spec:
      containers:
      - name: server
        image: mcp-hr-server:v1
        imagePullPolicy: IfNotPresent
        env:
        - name: DSN
          value: "root:native@tcp(mysql-service:3306)/hr_db"
        ports:
        - containerPort: 8080
        # 存活探针：检测服务是否运行
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
        # 就绪探针：检测服务是否可接收流量
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 3
          failureThreshold: 3
